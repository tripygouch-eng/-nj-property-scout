<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NJ Property Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060e06;
      color: #c8e6c8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Header */
    header {
      background: #080f08;
      border-bottom: 1px solid #1e2e1e;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 24px; color: #4caf50; }
    .header-title { font-size: 15px; letter-spacing: 4px; color: #4caf50; }
    .header-sub { font-size: 10px; color: #3a5a3a; letter-spacing: 2px; margin-top: 2px; }

    /* Main */
    main { max-width: 860px; margin: 0 auto; padding: 30px 18px 80px; }

    /* Search */
    .search-row { display: flex; gap: 10px; margin-bottom: 28px; }
    .search-input {
      flex: 1;
      background: #0a140a;
      border: 1px solid #2a3a2a;
      border-radius: 5px;
      color: #c8e6c8;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: #4caf50; }
    .search-btn {
      background: #1e3e1e;
      color: #4caf50;
      border: 1px solid #4caf50;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 12px 22px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .search-btn:hover:not(:disabled) { opacity: 0.8; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status */
    .status-line { text-align: center; color: #4caf50; letter-spacing: 3px; font-size: 11px; margin-bottom: 20px; }

    /* Error */
    .error-box {
      background: #180a0a;
      border: 1px solid #6a2a2a;
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 20px;
    }
    .error-label { color: #e88; font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
    .error-msg { color: #c88; font-size: 12px; }

    /* Property Card */
    .prop-card {
      border: 1px solid #1e2e1e;
      border-radius: 6px;
      margin-bottom: 12px;
      background: #0a140a;
      animation: fadeUp 0.2s ease;
      transition: border-color 0.2s;
    }
    .prop-card.active { border-color: #4caf50; }
    .prop-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .prop-num { color: #4caf50; font-size: 11px; min-width: 24px; }
    .prop-title { flex: 1; font-size: 13px; color: #d4e8d4; }
    .prop-toggle { color: #3a5a3a; font-size: 11px; }

    /* Expanded */
    .prop-body { border-top: 1px solid #1e2e1e; padding: 16px; }
    .prop-details { font-size: 12px; color: #7aaa7a; white-space: pre-wrap; line-height: 1.8; margin-bottom: 16px; }

    /* Action buttons */
    .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .action-btn {
      background: #0d160d;
      color: #7aaa7a;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .action-btn:hover:not(:disabled) { opacity: 0.8; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Info sections */
    .info-section { border: 1px solid #1e2e1e; border-radius: 5px; margin-bottom: 12px; overflow: hidden; }
    .info-header {
      background: #0d180d;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #7aaa7a;
      border-bottom: 1px solid #1e2e1e;
    }
    .info-body { padding: 12px 14px; font-size: 12px; color: #7aaa7a; white-space: pre-wrap; line-height: 1.8; }

    /* Notes */
    .notes-section { border: 1px solid #1e2e1e; border-radius: 5px; overflow: hidden; }
    .notes-header {
      background: #0d180d;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #7aaa7a;
      border-bottom: 1px solid #1e2e1e;
    }
    textarea.notes-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #c8e6c8;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 12px 14px;
      resize: vertical;
      line-height: 1.7;
      min-height: 100px;
    }
    textarea.notes-input:focus { outline: none; }

    /* Empty state */
    .empty { text-align: center; color: #2a4a2a; margin-top: 80px; }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-text { letter-spacing: 3px; font-size: 11px; }

    .spinner { display: inline-block; animation: spin 0.8s linear infinite; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a4a2a; border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">⬡</div>
    <div>
      <div class="header-title">NJ PROPERTY SCOUT</div>
      <div class="header-sub">FORECLOSURE · SHORT SALE · COMPS · LIENS · NOTES</div>
    </div>
  </header>

  <main>
    <div class="search-row">
      <input
        class="search-input"
        id="townshipInput"
        type="text"
        placeholder="Enter NJ Township (e.g. Toms River, Brick, Freehold...)"
        onkeydown="if(event.key==='Enter') search()"
      />
      <button class="search-btn" id="searchBtn" onclick="search()">SEARCH</button>
    </div>

    <div class="status-line" id="statusLine" style="display:none"></div>
    <div class="error-box" id="errorBox" style="display:none">
      <div class="error-label">⚠ ERROR</div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="results"></div>

    <div class="empty" id="emptyState">
      <div class="empty-icon">⬡</div>
      <div class="empty-text">ENTER A NJ TOWNSHIP TO BEGIN</div>
    </div>
  </main>

  <script>
    const state = {
      properties: [],
      comps: {},
      compsStatus: {},
      liens: {},
      liensStatus: {},
      notes: {},
      expanded: null,
    };

    async function callAPI(prompt) {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
      return data.result;
    }

    function parseProps(text) {
      const lines = text.split('\n').filter(l => l.trim());
      const result = [];
      let current = null;
      for (const line of lines) {
        const clean = line.replace(/\*+/g, '').trim();
        if (/^(\d+[\.\)])/.test(clean)) {
          if (current) result.push(current);
          current = { title: clean.replace(/^\d+[\.\)]\s*/, '').trim(), details: '' };
        } else if (current) {
          current.details += clean + '\n';
        }
      }
      if (current) result.push(current);
      return result.length ? result : [{ title: 'Results', details: text.replace(/\*+/g, '') }];
    }

    function setStatus(msg) {
      const el = document.getElementById('statusLine');
      if (msg) { el.style.display = 'block'; el.textContent = msg; }
      else el.style.display = 'none';
    }

    function setError(msg) {
      const box = document.getElementById('errorBox');
      if (msg) { box.style.display = 'block'; document.getElementById('errorMsg').textContent = msg; }
      else box.style.display = 'none';
    }

    function render() {
      const container = document.getElementById('results');
      const empty = document.getElementById('emptyState');
      empty.style.display = state.properties.length ? 'none' : 'block';
      container.innerHTML = '';

      state.properties.forEach((prop, idx) => {
        const isOpen = state.expanded === idx;
        const card = document.createElement('div');
        card.className = `prop-card${isOpen ? ' active' : ''}`;

        let inner = `
          <div class="prop-header" onclick="toggle(${idx})">
            <span class="prop-num">#${idx + 1}</span>
            <span class="prop-title">${prop.title}</span>
            <span class="prop-toggle">${isOpen ? '▲ close' : '▼ open'}</span>
          </div>
        `;

        if (isOpen) {
          const compsS = state.compsStatus[idx];
          const liensS = state.liensStatus[idx];

          inner += `<div class="prop-body">`;
          if (prop.details) inner += `<div class="prop-details">${prop.details}</div>`;

          inner += `<div class="actions">
            <button class="action-btn" onclick="fetchComps(${idx})" ${compsS === 'loading' ? 'disabled' : ''}>
              ${compsS === 'loading' ? '<span class="spinner">⟳</span>' : '⊞ Pull Comps'}
            </button>
            <button class="action-btn" onclick="fetchLiens(${idx})" ${liensS === 'loading' ? 'disabled' : ''}>
              ${liensS === 'loading' ? '<span class="spinner">⟳</span>' : '⚠ Check Liens'}
            </button>
          </div>`;

          if (state.comps[idx] || compsS === 'loading') {
            inner += `<div class="info-section">
              <div class="info-header">⊞ COMPARABLE SALES ${compsS === 'loading' ? '<span class="spinner">⟳</span>' : compsS === 'done' ? '✓' : ''}</div>
              <div class="info-body">${state.comps[idx] || 'Searching...'}</div>
            </div>`;
          }

          if (state.liens[idx] || liensS === 'loading') {
            inner += `<div class="info-section">
              <div class="info-header">⚠ LIEN CHECK ${liensS === 'loading' ? '<span class="spinner">⟳</span>' : liensS === 'done' ? '✓' : ''}</div>
              <div class="info-body">${state.liens[idx] || 'Searching...'}</div>
            </div>`;
          }

          inner += `<div class="notes-section">
            <div class="notes-header">✎ NOTES</div>
            <textarea class="notes-input" placeholder="Add your notes about this property..."
              onchange="saveNote(${idx}, this.value)"
              oninput="saveNote(${idx}, this.value)"
            >${state.notes[idx] || ''}</textarea>
          </div>`;

          inner += `</div>`;
        }

        card.innerHTML = inner;
        container.appendChild(card);
      });
    }

    function toggle(idx) {
      state.expanded = state.expanded === idx ? null : idx;
      render();
    }

    function saveNote(idx, val) {
      state.notes[idx] = val;
    }

    async function search() {
      const township = document.getElementById('townshipInput').value.trim();
      if (!township) return;

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner">⟳</span>';
      setStatus(`⟳ SCANNING ${township.toUpperCase()} TOWNSHIP...`);
      setError('');
      state.properties = [];
      state.comps = {}; state.compsStatus = {};
      state.liens = {}; state.liensStatus = {};
      state.notes = {};
      state.expanded = null;
      render();

      try {
        const result = await callAPI(
          `You are a New Jersey real estate investment research assistant.
The user wants to find foreclosed properties and short sales in ${township} township, New Jersey.
Provide a numbered list of:
1. The specific websites and resources to find foreclosures/short sales in ${township} NJ (sheriff sale site, MLS, Zillow, county site with actual URLs)
2. Any general info about the foreclosure market in that area
3. Tips specific to ${township} township NJ for finding deals
Format as a clean numbered list. No markdown bold. Be specific to ${township}, NJ.`
        );
        state.properties = parseProps(result);
        setStatus('');
      } catch (e) {
        setStatus('');
        setError(e.message);
      }

      btn.disabled = false;
      btn.textContent = 'SEARCH';
      render();
    }

    async function fetchComps(idx) {
      const prop = state.properties[idx];
      state.compsStatus[idx] = 'loading';
      render();

      const township = document.getElementById('townshipInput').value.trim();
      try {
        const result = await callAPI(
          `You are a NJ real estate comps analyst. For a property in ${township} township, NJ: "${prop.title}"
Provide:
1. What types of comps to look for in ${township} NJ
2. Exact websites to find recent sales data (Zillow, Redfin, NJ tax records with URLs)
3. Typical price ranges for properties in ${township} NJ
4. How to evaluate if a deal is good in this market
Be practical and specific. No markdown bold formatting.`
        );
        state.comps[idx] = result.replace(/\*+/g, '');
        state.compsStatus[idx] = 'done';
      } catch (e) {
        state.comps[idx] = 'Error: ' + e.message;
        state.compsStatus[idx] = 'error';
      }
      render();
    }

    async function fetchLiens(idx) {
      const prop = state.properties[idx];
      state.liensStatus[idx] = 'loading';
      render();

      const township = document.getElementById('townshipInput').value.trim();
      try {
        const result = await callAPI(
          `You are a NJ title research assistant. For a property in ${township} township, NJ: "${prop.title}"
Explain:
1. The exact NJ websites to check for tax liens (with URLs)
2. How to search ${township} county court records for judgments
3. What types of liens are common on NJ foreclosures
4. The NJ public records system investors should use
5. Red flags to watch for
Be specific to ${township} county/township NJ. No markdown bold formatting.`
        );
        state.liens[idx] = result.replace(/\*+/g, '');
        state.liensStatus[idx] = 'done';
      } catch (e) {
        state.liens[idx] = 'Error: ' + e.message;
        state.liensStatus[idx] = 'error';
      }
      render();
    }
  </script>
</body>
</html>
